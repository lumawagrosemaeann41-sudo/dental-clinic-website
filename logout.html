<!-- NAVBAR BUTTON -->
<nav>
   <!-- BACK BUTTON -->
<a href="index.html" class="back-btn">⬅ Back</a>
    

    <button class="logout-btn" onclick="openLogoutModal()">Logout</button>
</nav>

<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal">
    <div class="modal-box">
        <h2>Logout?</h2>
        <p>Are you sure you want to log out?</p>

        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeLogoutModal()">Cancel</button>
            <button class="confirm-btn" onclick="logout()">Yes, Logout</button>
        </div>
    </div>
</div>

<style>
/* NAVBAR */
nav {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 18px 50px;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* NAV LINKS */
nav a {
    text-decoration: none;
    margin-right: 20px;
    color: #2c7be5;
    font-weight: 800;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #2c7be5;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}
/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 30px;
    background: #0077b6;
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}
.back-btn {
    text-decoration: none;
    color: #2c7be5;
    font-weight: bold;
    background: white;
    padding: 8px 15px;
    border-radius: 20px;
    transition: 0.3s;
}

.btn:hover {
    background: #023e8a;
    transform: scale(1.05);
}
/* BACK BUTTON */
.back-btn {
    position: fixed;
    left: 20px;
    top: 20px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding: 10px 15px;
    border-radius: 30px;
    text-decoration: none;
    color: #023e8a;
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.back-btn:hover {
    background: white;
    transform: translateX(-3px);
}

/* LOGOUT BUTTON */
.logout-btn {
    margin-left: 20px;
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #ff4d4f, #cc0000);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.logout-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255,77,79,0.4);
}

/* MODAL (CENTERED PERFECTLY) */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);

    display: flex;
    justify-content: center;
    align-items: center; /* 👉 PERFECT CENTER */
}

/* MODAL BOX */
.modal-box {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    animation: pop 0.3s ease;
}

/* TEXT */
.modal-box h2 {
    color: #2c7be5;
    margin-bottom: 20px;
}

/* BUTTONS */
.modal-actions {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.cancel-btn {
    padding: 10px 15px;
    border-radius: 15px;
    border: none;
    background: #ccc;
    cursor: pointer;
}

.confirm-btn {
    padding: 10px 15px;
    border-radius: 15px;
    border: none;
    background: #2c7be5;
    color: white;
    cursor: pointer;
}

/* ANIMATION */
@keyframes pop {
    from {transform: scale(0.7); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>

<script>
function openLogoutModal() {
    document.getElementById("logoutModal").style.display = "flex";
}

function closeLogoutModal() {
    document.getElementById("logoutModal").style.display = "none";
}

function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}
</script>
